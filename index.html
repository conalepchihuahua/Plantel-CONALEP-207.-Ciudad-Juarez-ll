<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>CONALEP 207</title>
<link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/conalepchihuahua/Plantel-CONALEP-207.-Ciudad-Juarez-ll/refs/heads/main/Chihuahua/Logotipos%20del%20Estado/favicon.ico"/>
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/conalepchihuahua/Plantel-CONALEP-207.-Ciudad-Juarez-ll/refs/heads/main/Chihuahua/Logotipos%20del%20Estado/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --green:    #007E67;
  --green-lt: #EBF5F2;
  --maroon:   #9b2247;
  --maroon-lt:#FDF0F4;
  --gold:     #a57f2c;
  --gold-lt:  #FDF8EE;
  --ink:      #111418;
  --ink-2:    #464C54;
  --ink-3:    #8A9099;
  --line:     #E4E6EA;
  --bg:       #F5F6F8;
  --white:    #FFFFFF;
  --r:        10px;
  --t:        140ms;
}

html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Noto Sans',sans-serif;
  background:var(--white);color:var(--ink);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}

.page{display:none;position:fixed;inset:0;flex-direction:column;overflow:hidden;background:var(--white)}
.page.active{display:flex}

.auth-wrap{
  flex:1;overflow-y:auto;overflow-x:hidden;
  display:flex;align-items:center;justify-content:center;padding:0 24px
}
.auth-box{width:100%;max-width:340px;display:flex;flex-direction:column;padding:48px 0}
.auth-logo{height:44px;width:auto;align-self:center;margin-bottom:40px;object-fit:contain}
.auth-foot{
  flex-shrink:0;padding:12px 24px;
  padding-bottom:max(16px,env(safe-area-inset-bottom));
  border-top:1px solid var(--line)
}

.field-block{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.field-block.last{margin-bottom:20px}
.field-label{font-size:12px;font-weight:600;color:var(--ink-2);padding:0 2px}
.field-wrap{position:relative}
.field-input{
  width:100%;height:48px;
  background:var(--bg);border:1.5px solid var(--line);
  border-radius:var(--r);padding:0 44px 0 14px;
  font-family:'Noto Sans',sans-serif;font-size:15px;color:var(--ink);
  outline:none;appearance:none;transition:border-color var(--t)
}
.field-input::placeholder{color:var(--ink-3)}
.field-input:focus{border-color:var(--green);background:var(--white)}
.field-input.error{border-color:var(--maroon)}
.field-ico{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  font-size:18px;color:var(--ink-3);pointer-events:none
}
.field-eye{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:32px;height:32px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px
}
.field-eye i{font-size:18px;color:var(--ink-3)}
.field-msg{
  display:none;font-size:12px;font-weight:500;color:var(--maroon);
  padding:0 2px;line-height:1.5
}
.field-msg.info{color:var(--green)}
.field-msg.center{text-align:center;padding:0}
.field-msg.show{display:block}
.mt-8{margin-top:8px}

.btn-primary{
  height:48px;width:100%;border-radius:var(--r);border:none;
  background:var(--green);color:var(--white);
  font-family:'Noto Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:opacity var(--t)
}
.btn-primary:active{opacity:.78}
.btn-primary.loading{opacity:.4;pointer-events:none}

.btn-secondary{
  height:48px;width:100%;border-radius:var(--r);
  border:1.5px solid var(--line);background:transparent;color:var(--ink-2);
  font-family:'Noto Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background var(--t)
}
.btn-secondary:active{background:var(--bg)}

.btn-text{
  background:none;border:none;cursor:pointer;
  font-family:'Noto Sans',sans-serif;font-size:13px;font-weight:500;
  color:var(--green);padding:10px;align-self:center;margin-top:6px;
  transition:opacity var(--t)
}
.btn-text:active{opacity:.6}

.app-header{
  height:56px;flex-shrink:0;display:flex;align-items:center;
  padding:0 16px;padding-top:env(safe-area-inset-top);
  background:var(--white);gap:12px
}
.hdr-btn{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:transparent;cursor:pointer;border-radius:8px;flex-shrink:0;
  margin-left:-10px;
  transition:background var(--t)
}
.hdr-btn:active{background:var(--bg)}
.hdr-btn i{font-size:22px;color:var(--ink-2)}
.hdr-logo{height:22px;width:auto;object-fit:contain}

.tab-bar{
  flex-shrink:0;display:flex;
  background:var(--white);
  padding-bottom:env(safe-area-inset-bottom)
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  height:56px;background:transparent;border:none;cursor:pointer;
  color:var(--ink-3);font-family:'Noto Sans',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  transition:color var(--t);position:relative
}
.tab-btn i{font-size:22px}
.tab-btn.active{color:var(--green)}
.tab-btn.active::before{
  content:'';position:absolute;top:0;left:16px;right:16px;
  height:2px;background:var(--green);border-radius:0 0 2px 2px
}

.tab-content{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.tab-screen{display:none;flex:1;min-height:0;flex-direction:column}
.tab-screen.active{display:flex}

#screen-aseo{overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.aseo-body{display:flex;flex-direction:column;padding-bottom:24px}

#screen-avisos{background:var(--bg)}
.avisos-body{
  overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;
  display:flex;flex-direction:column;padding-bottom:24px
}

.my-turn-strip{
  margin:12px 16px 0;
  background:var(--green);border-radius:var(--r);
  padding:16px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:opacity var(--t)
}
.my-turn-strip:active{opacity:.85}
.my-turn-info{flex:1;min-width:0}
.my-turn-label{font-size:12px;font-weight:500;color:rgba(255,255,255,.65);margin-bottom:2px}
.my-turn-date{font-size:18px;font-weight:700;color:#fff;text-transform:capitalize;line-height:1.3}
.my-turn-sub{font-size:12px;font-weight:500;color:rgba(255,255,255,.5);margin-top:6px;display:flex;align-items:center;gap:4px}
.my-turn-sub i{font-size:13px}
.my-turn-chevron{font-size:20px;color:rgba(255,255,255,.4);flex-shrink:0}

.section-card{
  margin:12px 16px 0;
  background:var(--white);border-radius:var(--r);overflow:hidden
}

.card-header{
  padding:14px 16px;border-bottom:1px solid var(--line);
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px
}
.card-header-info{display:flex;flex-direction:column;gap:3px}
.card-date{font-size:11px;font-weight:700;letter-spacing:.7px;color:var(--gold);text-transform:uppercase}
.card-title{font-size:14px;font-weight:600;color:var(--ink)}
.card-admin-btn{
  width:32px;height:32px;border:none;background:transparent;
  border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background var(--t)
}
.card-admin-btn:active{background:var(--bg)}
.card-admin-btn i{font-size:18px;color:var(--ink-3)}

.cancelled-bar{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;background:var(--maroon-lt);
  border-bottom:1px solid var(--line);
  font-size:12px;font-weight:500;color:var(--maroon);line-height:1.4
}
.cancelled-bar i{font-size:15px;flex-shrink:0}

.student-row{
  display:flex;align-items:center;
  padding:0 16px;gap:12px;min-height:52px;
  border-bottom:1px solid var(--line);cursor:pointer;
  transition:background var(--t)
}
.student-row:last-child{border-bottom:none}
.student-row:active{background:var(--bg)}
.student-row.expanded{align-items:flex-start;padding-top:12px;padding-bottom:12px}

.st-icon{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:var(--bg);display:flex;align-items:center;justify-content:center
}
.st-icon i{font-size:16px;color:var(--ink-3)}

.st-body{flex:1;min-width:0;overflow:hidden}
.st-name{
  font-size:14px;font-weight:500;color:var(--ink);line-height:1.4;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color var(--t)
}
.st-name.open{white-space:normal;overflow:visible;text-overflow:unset;color:var(--green)}
.st-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.st-num{font-size:11px;font-weight:600;color:var(--ink-3)}
.st-badge{
  font-size:10px;font-weight:700;letter-spacing:.3px;
  padding:2px 6px;border-radius:4px;
  color:var(--gold);background:var(--gold-lt);text-transform:uppercase
}

.expand-btn{
  margin:12px 16px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  height:44px;border-radius:var(--r);
  border:none;background:var(--white);cursor:pointer;
  font-family:'Noto Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink-3);
  transition:color var(--t)
}
.expand-btn:active{background:var(--line)}
.expand-btn i.caret{font-size:16px;transition:transform 240ms}
.expand-btn.open{color:var(--green)}
.expand-btn.open i.caret{transform:rotate(180deg)}

.more-list{display:flex;flex-direction:column;overflow:hidden;max-height:0;opacity:0;transition:max-height 600ms,opacity 200ms}
.more-list.open{max-height:99999px;opacity:1}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:56px 32px;gap:8px;text-align:center
}
.empty-state i{font-size:28px;color:var(--line);margin-bottom:4px}
.empty-state .e-title{font-size:14px;font-weight:600;color:var(--ink-3)}
.empty-state .e-sub{font-size:13px;color:var(--ink-3);line-height:1.6;max-width:240px}
.empty-state.err i{color:var(--maroon)}
.empty-state.err .e-title{color:var(--maroon)}

.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.32);z-index:100;
  opacity:0;transition:opacity 180ms
}
.overlay.open{display:block}
.overlay.vis{opacity:1}

.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-radius:16px 16px 0 0;
  border-top:1px solid var(--line);z-index:101;max-height:82vh;
  display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
  transform:translateY(100%);
  transition:transform 280ms cubic-bezier(.32,.72,0,1)
}
.sheet.open{transform:translateY(0)}

.sheet-grip{
  width:32px;height:4px;border-radius:2px;background:var(--line);
  align-self:center;margin:10px 0 0;flex-shrink:0
}
.sheet-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;flex-shrink:0;border-bottom:1px solid var(--line)
}
.sheet-title{font-size:15px;font-weight:600;color:var(--ink)}
.sheet-close-btn{
  width:28px;height:28px;border:1px solid var(--line);background:transparent;
  border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background var(--t)
}
.sheet-close-btn:active{background:var(--bg)}
.sheet-close-btn i{font-size:14px;color:var(--ink-3)}
.sheet-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}

.sheet-row{
  display:flex;align-items:center;padding:0 20px;
  gap:12px;min-height:56px;border-bottom:1px solid var(--line)
}
.sheet-row:last-child{border-bottom:none}
.sr-icon{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:var(--bg);display:flex;align-items:center;justify-content:center
}
.sr-icon i{font-size:16px;color:var(--ink-3)}
.sr-icon.me{background:var(--green-lt)}
.sr-icon.me i{color:var(--green)}
.sr-info{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;overflow:hidden}
.sr-name{font-size:14px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-you{font-size:11px;font-weight:600;color:var(--green)}
.sr-num{font-size:11px;font-weight:600;color:var(--ink-3);flex-shrink:0}

.hist-row{
  display:flex;align-items:center;padding:0 20px;
  gap:12px;min-height:56px;border-bottom:1px solid var(--line);
  transition:background var(--t)
}
.hist-row:last-child{border-bottom:none}
.hist-row:active{background:var(--bg)}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--maroon)}
.hist-info{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;overflow:hidden}
.hist-date{font-size:14px;font-weight:500;color:var(--ink);text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-sub{font-size:11px;color:var(--ink-3)}
.hist-btn{
  height:30px;padding:0 10px;border-radius:6px;
  border:1.5px solid var(--line);background:transparent;
  color:var(--ink-2);font-family:'Noto Sans',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;gap:4px;transition:border-color var(--t)
}
.hist-btn:active{border-color:var(--ink-3)}
.hist-btn.loading{opacity:.4;pointer-events:none}
.hist-btn i{font-size:14px}

.ajuste-body{padding:20px;border-bottom:1px solid var(--line)}
.ajuste-desc{font-size:14px;line-height:1.75;color:var(--ink-2)}
.ajuste-foot{padding:16px 20px;padding-bottom:max(16px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:8px}
.ajuste-action{
  height:48px;width:100%;border-radius:var(--r);border:none;
  font-family:'Noto Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:opacity var(--t)
}
.ajuste-action:active{opacity:.78}
.ajuste-action.loading{opacity:.4;pointer-events:none}
.ajuste-action.cancel{background:var(--maroon);color:var(--white)}
.ajuste-action.restore{background:var(--green);color:var(--white)}
.ajuste-dismiss{
  height:44px;width:100%;border-radius:var(--r);
  border:none;background:transparent;
  font-family:'Noto Sans',sans-serif;font-size:14px;font-weight:500;
  color:var(--ink-3);cursor:pointer;transition:background var(--t)
}
.ajuste-dismiss:active{background:var(--bg)}
.ajuste-err{font-size:12px;font-weight:500;color:var(--maroon);text-align:center;line-height:1.5}

.menu-user{
  display:flex;align-items:center;gap:12px;
  padding:16px 20px;border-bottom:1px solid var(--line)
}
.menu-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:var(--green-lt);display:flex;align-items:center;justify-content:center
}
.menu-avatar i{font-size:18px;color:var(--green)}
.menu-user-label{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--ink-3);text-transform:uppercase;margin-bottom:2px}
.menu-user-email{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}

.menu-item{
  display:flex;align-items:center;gap:14px;
  padding:0 20px;height:54px;width:100%;
  background:none;border:none;border-bottom:1px solid var(--line);
  cursor:pointer;font-family:'Noto Sans',sans-serif;transition:background var(--t)
}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:var(--bg)}
.menu-item-ico{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;background:var(--bg)
}
.menu-item-ico.danger{background:var(--maroon-lt)}
.menu-item-ico i{font-size:17px;color:var(--ink-2)}
.menu-item-ico.danger i{color:var(--maroon)}
.menu-item-label{font-size:14px;font-weight:500;color:var(--ink)}
.menu-item-label.danger{color:var(--maroon)}

.notif-item{
  margin:12px 16px 0;
  background:var(--white);border-radius:var(--r);overflow:hidden
}
.notif-main{display:flex;align-items:flex-start;gap:12px;padding:16px}
.notif-badge{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;background:var(--bg)
}
.notif-badge i{font-size:18px;color:var(--ink-3)}
.notif-badge.green{background:var(--green-lt)}
.notif-badge.green i{color:var(--green)}
.notif-badge.gold{background:var(--gold-lt)}
.notif-badge.gold i{color:var(--gold)}
.notif-badge.maroon{background:var(--maroon-lt)}
.notif-badge.maroon i{color:var(--maroon)}
.notif-text{flex:1;min-width:0}

.notif-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.notif-desc{font-size:12px;color:var(--ink-3);line-height:1.65;margin-top:4px}
.notif-foot{padding:0 16px 16px}
.notif-action{
  height:40px;width:100%;border-radius:var(--r);border:none;
  background:var(--green);color:var(--white);
  font-family:'Noto Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:opacity var(--t)
}
.notif-action:active{opacity:.78}
.notif-action.loading{opacity:.4;pointer-events:none}
.notif-action i{font-size:16px}

.toast{
  position:fixed;bottom:0;left:12px;right:12px;
  background:var(--ink);border-radius:var(--r);
  padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:200;
  transform:translateY(calc(100% + 80px));
  transition:transform 240ms cubic-bezier(.32,.72,0,1);
  margin-bottom:max(68px,calc(env(safe-area-inset-bottom) + 68px))
}
.toast.show{transform:translateY(0)}
.toast-ico{font-size:17px;flex-shrink:0}
.toast-ico.ok{color:#4ECBA8}
.toast-ico.err{color:#E07A7A}
.toast-msg{flex:1;font-size:13px;font-weight:500;color:var(--white);line-height:1.4}
.toast-undo{
  height:28px;padding:0 10px;border-radius:6px;flex-shrink:0;
  border:1px solid rgba(255,255,255,.25);background:transparent;
  color:var(--white);font-family:'Noto Sans',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;transition:background var(--t)
}
.toast-undo:active{background:rgba(255,255,255,.1)}
</style>
</head>
<body>

<div id="page-login" class="page active">
  <div class="auth-wrap">
    <div class="auth-box">
      <img src="https://raw.githubusercontent.com/conalepchihuahua/Plantel-CONALEP-207.-Ciudad-Juarez-ll/refs/heads/main/Chihuahua/Logotipos%20del%20Estado/Chihuahua_4.png" alt="CONALEP" class="auth-logo"/>
      <div class="field-block">
        <label class="field-label" for="correo">Correo institucional</label>
        <div class="field-wrap">
          <input id="correo" type="email" placeholder="usuario@chih.conalep.edu.mx" autocomplete="email" class="field-input"/>
          <i class="ph ph-envelope field-ico"></i>
        </div>
        <p id="login-correo-error" class="field-msg"></p>
      </div>
      <div class="field-block last">
        <label class="field-label" for="pass">Contraseña</label>
        <div class="field-wrap">
          <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password" class="field-input"/>
          <button type="button" onclick="togglePass(this)" class="field-eye"><i class="ph ph-eye"></i></button>
        </div>
        <p id="login-pass-error" class="field-msg"></p>
      </div>
      <button type="button" onclick="entrar()" class="btn-primary">Iniciar sesión</button>
      <p id="login-error" class="field-msg center mt-8"></p>

function esMMFD(a){return(a['MMFD']||'').toLowerCase().includes('incorporado')}

function proximoHabil(desde){
  const d=new Date(desde);d.setHours(0,0,0,0);
  while(d.getDay()===0||d.getDay()===6||cancelado(d))d.setDate(d.getDate()+1);
  return d;
}
function siguientes(desde,n){
  const dias=[];const d=new Date(desde);d.setHours(0,0,0,0);
  while(dias.length<n){if(d.getDay()!==0&&d.getDay()!==6&&!cancelado(d))dias.push(new Date(d));d.setDate(d.getDate()+1)}
  return dias;
}
function restantesSemana(desde){
  const dias=[];const d=new Date(desde);d.setHours(0,0,0,0);
  while(d.getDay()>=1&&d.getDay()<=5){if(!cancelado(d))dias.push(new Date(d));d.setDate(d.getDate()+1)}
  return dias;
}

function simular(alumnos,fechas){
  if(!fechas.length)return new Map();
  const sorted=[...fechas].sort((a,b)=>a-b);
  const max=sorted[sorted.length-1];
  const set=new Set(fechas.map(f=>fkey(f)));
  const result=new Map();
  let queue=[...alumnos];
  const d=new Date(ROTACION_INICIO);d.setHours(0,0,0,0);
  const h=new Date(max);h.setHours(0,0,0,0);
  while(d<=h){
    const dow=d.getDay();
    if(dow!==0&&dow!==6&&!cancelado(d)){
      const restr=dow===1||dow===2;
      const eq=[],skip=[];
      let i=0;
      while(eq.length<5&&i<queue.length){const a=queue[i];if(restr&&esMMFD(a))skip.push(a);else eq.push(a);i++}
      if(set.has(fkey(d)))result.set(fkey(d),[...eq]);
      queue=[...skip,...queue.slice(i),...eq];
    }
    d.setDate(d.getDate()+1);
  }
  return result;
}

function proximoTurno(alumnos,correo,desde){
  const futuros=siguientes(desde,90);
  if(!futuros.length)return null;
  const eqs=simular(alumnos,futuros);
  for(const f of futuros){
    const eq=eqs.get(fkey(f))||[];
    if(eq.some(a=>(a['Correo Institucional']||'').toLowerCase()===correo))return{fecha:f,equipo:eq};
  }
  return null;
}

function nombre(a){
  const p1=(a['Primer Nombre']||'').trim(),p2=(a['Segundo Nombre']||'').trim();
  const ap=(a['Apellido Paterno']||'').trim(),am=(a['Apellido Materno']||'').trim();
  const n=[p1,p2].filter(Boolean).join(' ');
  const ap2=[ap,am].filter(Boolean).join(' ');
  if(n&&ap2)return n+' '+ap2;
  return n||ap2||'Alumno '+(a['No']||'');
}

function fstr(d,opts){return d.toLocaleDateString('es-MX',opts||{weekday:'long',day:'numeric',month:'long'})}

async function cargarAseo(){
  if(_aseoLoaded)return;_aseoLoaded=true;
  const cont=document.getElementById('aseo-body');cont.innerHTML='';
  const correoUsuario=auth.currentUser?.email?.toLowerCase()??null;
  const uid=auth.currentUser?.uid??null;
  _esAdmin=await esAdmin(uid);
  try{const s=await db.ref('cancelaciones').once('value');_cancelados=s.val()||{}}
  catch{_cancelados={}}
  renderMenuAdmin();
  try{
    const snap=await db.ref('estudiantes').once('value');
    const alumnos=[];
    snap.forEach(c=>{const v=c.val();if(v&&typeof v==='object')alumnos.push(v)});
    if(!alumnos.length){
      cont.innerHTML='<div class="empty-state"><i class="ph ph-users"></i><p class="e-title">Sin estudiantes registrados</p></div>';
      return;
    }
    alumnos.sort((a,b)=>(parseInt(a['No'])||0)-(parseInt(b['No'])||0));
    const hoy=new Date();hoy.setHours(0,0,0,0);
    const esFDS=hoy.getDay()===0||hoy.getDay()===6;
    const hoyCancelado=cancelado(hoy);
    const manana=new Date(hoy);manana.setDate(manana.getDate()+1);

    if(esFDS||hoyCancelado){
      const prox=proximoHabil(manana);
      const sigDesde=new Date(prox);sigDesde.setDate(sigDesde.getDate()+1);
      const rest=_esAdmin?siguientes(sigDesde,19):restantesSemana(sigDesde);
      const fechas=[prox,...rest];
      const eqs=simular(alumnos,fechas);
      const eqProx=eqs.get(fkey(prox))||[];
      if(correoUsuario){
        const turno=proximoTurno(alumnos,correoUsuario,manana);
        if(turno){const yi=turno.equipo.findIndex(a=>(a['Correo Institucional']||'').toLowerCase()===correoUsuario);mkTurnStrip(cont,turno.fecha,turno.equipo,yi>=0?yi:null)}
      }
      mkCard(cont,eqProx,prox,hoyCancelado?'Próximo equipo disponible':'Equipo del próximo día hábil',false,_esAdmin);
      mkExpandBtn(cont,rest,eqs,_esAdmin);
      return;
    }

    const resto=_esAdmin?siguientes(manana,20):restantesSemana(manana);
    const fechas=[hoy,...resto];
    const eqs=simular(alumnos,fechas);
    const eqHoy=eqs.get(fkey(hoy))||[];
    const limpiaHoy=correoUsuario&&eqHoy.some(a=>(a['Correo Institucional']||'').toLowerCase()===correoUsuario);
    if(correoUsuario&&!limpiaHoy){
      const turno=proximoTurno(alumnos,correoUsuario,manana);
      if(turno){const yi=turno.equipo.findIndex(a=>(a['Correo Institucional']||'').toLowerCase()===correoUsuario);mkTurnStrip(cont,turno.fecha,turno.equipo,yi>=0?yi:null)}
    }
    mkCard(cont,eqHoy,hoy,'Equipo de hoy',false,_esAdmin);
    mkExpandBtn(cont,resto,eqs,_esAdmin);
  }catch{
    cont.innerHTML='<div class="empty-state err"><i class="ph ph-wifi-slash"></i><p class="e-title">No se pudo cargar la información</p><p class="e-sub">Verifica tu conexión e intenta de nuevo.</p></div>';
  }
}

function abrirEquipoSheet(){
  const body=document.getElementById('sheet-equipo-body');body.innerHTML='';
  _equipoSheet.forEach((a,i)=>{
    const esYo=i===_yoIdx;
    const row=document.createElement('div');row.className='sheet-row';
    row.innerHTML=`<div class="sr-icon${esYo?' me':''}"><i class="ph ph-user"></i></div><div class="sr-info"><span class="sr-name">${nombre(a)}</span>${esYo?'<span class="sr-you">Tú</span>':''}</div><span class="sr-num">No.${a['No']||''}</span>`;
    body.appendChild(row);
  });
  abrirOverlay('sheet-equipo');
}

function abrirHistorial(){
  const body=document.getElementById('sheet-historial-body');body.innerHTML='';
  const claves=Object.keys(_cancelados).sort();
  if(!claves.length){
    body.innerHTML='<div class="empty-state"><i class="ph ph-check-circle"></i><p class="e-title">Sin jornadas canceladas</p></div>';
    abrirOverlay('sheet-historial');return;
  }
  claves.forEach(key=>{
    const [y,m,d]=key.split('-').map(Number);
    const fecha=new Date(y,m-1,d);
    const hoy=new Date();hoy.setHours(0,0,0,0);
    const row=document.createElement('div');row.className='hist-row';
    row.innerHTML=`<div class="hist-dot"></div><div class="hist-info"><span class="hist-date">${fstr(fecha,{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span><span class="hist-sub">${fecha<hoy?'Fecha pasada':'Próxima'}</span></div><button class="hist-btn" data-key="${key}"><i class="ph ph-arrow-counter-clockwise"></i>Restaurar</button>`;
    row.querySelector('.hist-btn').addEventListener('click',function(){restaurarHistorial(this)});
    body.appendChild(row);
  });
  abrirOverlay('sheet-historial');
}

async function restaurarHistorial(btn){
  const key=btn.dataset.key;btn.classList.add('loading');
  try{
    await db.ref('cancelaciones/'+key).remove();delete _cancelados[key];
    const row=btn.closest('.hist-row');
    row.style.transition='opacity 160ms';row.style.opacity='0';
    setTimeout(()=>{
      row.remove();
      const body=document.getElementById('sheet-historial-body');
      if(!body.querySelector('.hist-row'))body.innerHTML='<div class="empty-state"><i class="ph ph-check-circle"></i><p class="e-title">Sin jornadas canceladas</p></div>';
    },160);
    _aseoLoaded=false;setTimeout(()=>cargarAseo(),280);
    const [y,m,d]=key.split('-').map(Number);
    toast(`Jornada del ${fstr(new Date(y,m-1,d))} restaurada`,'ph-check-circle ok',async()=>{await db.ref('cancelaciones/'+key).set(true);_cancelados[key]=true;_aseoLoaded=false;cargarAseo()});
  }catch{btn.classList.remove('loading');toast('No se pudo restaurar. Intenta de nuevo.','ph-warning-circle err',null)}
}

function abrirAjuste(btn){
  _ajusteKey=btn.dataset.key;_ajusteCancelado=btn.dataset.cancelado==='1';
  const [y,m,d]=_ajusteKey.split('-').map(Number);
  const f=fstr(new Date(y,m-1,d));
  const title=document.getElementById('ajuste-title');
  const desc=document.getElementById('ajuste-desc');
  const action=document.getElementById('ajuste-action');
  if(_ajusteCancelado){
    title.textContent='Restaurar jornada';
    desc.textContent=`La jornada del ${f} está cancelada. Al restaurarla, la rotación volverá a incluir este día y el equipo asignado regresará a su posición original.`;
    action.textContent='Restaurar jornada';action.className='ajuste-action restore';
  }else{
    title.textContent='Cancelar jornada';
    desc.textContent=`Al cancelar la jornada del ${f}, la rotación se ajustará automáticamente y el equipo asignado pasará al siguiente día hábil disponible.`;
    action.textContent='Cancelar jornada';action.className='ajuste-action cancel';
  }
  abrirOverlay('sheet-ajuste');
}

function abrirOverlay(sheetId){
  const ov=document.getElementById('overlay');
  document.getElementById(sheetId).classList.add('open');
  ov.classList.add('open');
  requestAnimationFrame(()=>ov.classList.add('vis'));
}

async function confirmarAjuste(){
  const action=document.getElementById('ajuste-action');
  action.disabled=true;action.classList.add('loading');
  document.getElementById('sheet-ajuste').querySelector('.ajuste-err')?.remove();
  const key=_ajusteKey,eraCancelado=_ajusteCancelado;
  const [y,m,d]=key.split('-').map(Number);
  const f=fstr(new Date(y,m-1,d));
  try{
    if(eraCancelado){await db.ref('cancelaciones/'+key).remove();delete _cancelados[key]}
    else{await db.ref('cancelaciones/'+key).set(true);_cancelados[key]=true}
    _aseoLoaded=false;cerrarSheet();setTimeout(()=>cargarAseo(),280);
    if(eraCancelado)toast(`Jornada del ${f} restaurada`,'ph-check-circle ok',async()=>{await db.ref('cancelaciones/'+key).set(true);_cancelados[key]=true;_aseoLoaded=false;cargarAseo()});
    else toast(`Jornada del ${f} cancelada`,'ph-x-circle err',async()=>{await db.ref('cancelaciones/'+key).remove();delete _cancelados[key];_aseoLoaded=false;cargarAseo()});
  }catch(e){
    action.disabled=false;action.classList.remove('loading');
    const err=document.createElement('p');err.className='ajuste-err';
    err.textContent=e?.message||'Error al guardar. Intenta de nuevo.';action.before(err);
  }
}

function cerrarSheet(){
  const ov=document.getElementById('overlay');
  ['sheet-equipo','sheet-ajuste','sheet-historial','sheet-menu'].forEach(id=>document.getElementById(id).classList.remove('open'));
  ov.classList.remove('vis');
  setTimeout(()=>ov.classList.remove('open'),240);
}

function abrirMenu(){document.getElementById('menu-email').textContent=auth.currentUser?.email??'';abrirOverlay('sheet-menu')}
async function cerrarSesion(){cerrarSheet();try{await auth.signOut()}catch{}}

auth.onAuthStateChanged(async user=>{
  if(user){
    showPage('page-app');await registrarToken(user.uid,user.email);cargarAseo();
  }else{
    _cancelados={};_esAdmin=false;_aseoLoaded=false;_equipoSheet=[];_yoIdx=null;_tabActual='aseo';
    document.getElementById('aseo-body').innerHTML='';
    document.getElementById('menu-admin-rows').innerHTML='';
    document.querySelectorAll('.tab-screen').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>{
      b.classList.remove('active');
      b.querySelector('i').className=b.querySelector('i').className.replace('ph-fill ph-','ph ph-');
    });
    document.getElementById('screen-aseo').classList.add('active');
    const at=document.getElementById('tab-aseo');
    at.classList.add('active');at.querySelector('i').className='ph-fill ph-broom';
    irALogin();
  }
});

if(messaging){
  messaging.onMessage(payload=>{
    toast(payload.notification?.body??payload.notification?.title??'Nuevo aviso del plantel','ph-bell ok',null);
  });
}

function renderNotifCard(){
  const card=document.getElementById('notif-card');if(!card)return;
  const supported=('Notification' in window)&&!!messaging;
  const perm=supported?Notification.permission:'unsupported';
  const map={
    granted:    {cls:'green', icon:'ph-bell-ringing',     tag:'Activas',      title:'Recibes avisos del plantel',          desc:'Te notificaremos cuando haya comunicados o cambios importantes en la rotación de CONALEP Plantel 207.',btn:null},
    default:    {cls:'gold',  icon:'ph-bell',              tag:'Desactivadas', title:'Activa las notificaciones de avisos', desc:'Permítenos avisarte cuando haya comunicados o cambios en la rotación de aseo.',btn:{label:'Activar notificaciones',icon:'ph-bell'}},
    denied:     {cls:'maroon',icon:'ph-bell-slash',        tag:'Bloqueadas',   title:'Acceso denegado por el navegador',    desc:'Para activarlas, ve a la configuración de tu navegador, busca este sitio y permite las notificaciones.',btn:null},
    unsupported:{cls:'',      icon:'ph-bell-simple-slash', tag:'No compatible',title:'Notificaciones no disponibles',       desc:'Tu navegador no soporta notificaciones push. Consulta los avisos directamente en esta sección.',btn:null}
  };
  const e=map[perm]||map.unsupported;
  card.className='notif-item';
  card.innerHTML=`<div class="notif-main"><div class="notif-badge ${e.cls}"><i class="ph ${e.icon}"></i></div><div class="notif-text"><p class="notif-title">${e.title}</p><p class="notif-desc">${e.desc}</p></div></div>${e.btn?`<div class="notif-foot"><button id="notif-btn" class="notif-action"><i class="ph ${e.btn.icon}"></i>${e.btn.label}</button></div>`:''}`;
  if(e.btn){
    document.getElementById('notif-btn').addEventListener('click',async function(){
      this.classList.add('loading');
      try{const p=await Notification.requestPermission();if(p==='granted'){const u=auth.currentUser;if(u)await registrarToken(u.uid,u.email)}renderNotifCard()}
      catch{renderNotifCard()}
    });
  }
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
